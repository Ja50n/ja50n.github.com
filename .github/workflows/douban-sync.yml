name: Sync Douban Data
on:
  schedule:
    - cron: "0 7 * * *" # 每日7点自动同步
  workflow_dispatch: # 仓库Actions页面可手动触发
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install requests beautifulsoup4 pyyaml
      - run: python sync_douban.py
      - name: Commit & Push data
        run: |
          git config --global user.name "Github Bot"
          git config --global user.email "bot@github.com"
          git add _data/douban.yml
          git commit -m "Auto update douban book/movie data" || true
          git push
