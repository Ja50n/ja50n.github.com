---
layout: default
title: 我的观影记录
---
<h2>已看电影</h2>
<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:1rem;">
{% for m in site.data.douban.movies.collect %}
<div>
  <img src="{{ m.cover }}" style="width:100%;border-radius:4px;">
  <h4 style="margin:6px 0 2px;font-size:14px;">{{ m.title }}</h4>
  <p style="font-size:12px;color:#666;">{{ m.rating }}｜{{ m.date }}</p>
  <p style="font-size:12px;">{{ m.comment }}</p>
</div>
{% endfor %}
</div>

<h2>想看电影</h2>
<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:1rem;">
{% for m in site.data.douban.movies.wish %}
<div>
  <img src="{{ m.cover }}" style="width:100%;border-radius:4px;">
  <h4 style="margin:6px 0 2px;font-size:14px;">{{ m.title }}</h4>
</div>
{% endfor %}
</div>
